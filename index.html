<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔐 FaceAuth · State Machine Security</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            padding: 1.8rem 2rem 2.2rem;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.6);
            transition: all 0.2s;
        }
        h1 {
            margin: 0 0 0.3rem 0;
            font-weight: 600;
            font-size: 2.1rem;
            letter-spacing: -0.02em;
            color: #f0f9ff;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .badge {
            background: #2dd4bf;
            color: #0f172a;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 40px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .security-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0 20px;
        }
        .state-machine-view {
            background: #0b1120cc;
            padding: 10px 20px;
            border-radius: 60px;
            border-left: 5px solid #38bdf8;
            box-shadow: inset 0 1px 3px #00000055, 0 6px 8px #00000020;
        }
        .state-label {
            text-transform: uppercase;
            font-weight: 600;
            font-size: 0.8rem;
            color: #94a3b8;
            letter-spacing: 1px;
        }
        .state-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e2e8f0;
            line-height: 1.3;
            text-shadow: 0 2px 5px #00000050;
        }
        .security-context {
            color: #a5f3fc;
            font-size: 0.9rem;
            display: flex;
            gap: 15px;
        }
        .video-zone {
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            background: #000000;
            box-shadow: 0 20px 30px -5px #00000080, 0 0 0 1px #3b82f644;
            margin-bottom: 20px;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1); /* mirror */
            background: #030712;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin: 18px 0 10px;
        }
        button {
            background: #1e293b;
            border: 1px solid #475569;
            color: #f1f5f9;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.15s;
            box-shadow: 0 8px 12px #00000030;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        button:hover {
            background: #2d3b52;
            border-color: #60a5fa;
            transform: translateY(-2px);
            box-shadow: 0 12px 16px #00000040;
        }
        button.primary {
            background: #2563eb;
            border-color: #93c5fd;
            color: white;
        }
        button.warning {
            background: #b45309;
            border-color: #fbbf24;
        }
        button:disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.6);
        }
        .register-section {
            background: #0f172a80;
            border-radius: 28px;
            padding: 16px 24px;
            margin: 15px 0 5px;
            backdrop-filter: blur(8px);
            border: 1px solid #334155;
        }
        .label-row {
            display: flex;
            gap: 15px;
            align-items: baseline;
            flex-wrap: wrap;
        }
        input {
            background: #020617;
            border: 1px solid #475569;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 1rem;
            flex: 2 1 200px;
            outline: none;
        }
        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px #1e3a8a55;
        }
        .face-list {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .chip {
            background: #1e293b;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #b9d4f1;
            border: 1px solid #4b5563;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chip button {
            padding: 4px 12px;
            font-size: 0.75rem;
            background: #7f1d1d;
            border: none;
            box-shadow: none;
            margin: 0;
        }
        .log-area {
            margin-top: 18px;
            color: #9ca3af;
            font-size: 0.9rem;
            max-height: 70px;
            overflow-y: auto;
            border-top: 1px dashed #3f4e6b;
            padding-top: 10px;
        }
        .footnote {
            color: #6b7280;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>
        <span>🧠 FaceID·Sentinel</span>
        <span class="badge">state machine</span>
    </h1>

    <!-- SECURITY STATE MACHINE PANEL -->
    <div class="security-panel">
        <div class="state-machine-view">
            <div class="state-label">⚙️ CURRENT STATE</div>
            <div class="state-value" id="stateDisplay">LOCKED</div>
        </div>
        <div class="security-context">
            <span id="authLevelDisplay">🔒 Level: 0</span>
            <span id="transitionHint">⏳ waiting</span>
        </div>
    </div>

    <!-- VIDEO + CANVAS OVERLAY -->
    <div class="video-zone">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <!-- CONTROLS (ACTIONS TRIGGER STATE TRANSITIONS) -->
    <div class="controls">
        <button id="startCameraBtn" class="primary">📷 Start Camera</button>
        <button id="stopCameraBtn">⏹️ Stop</button>
        <button id="detectOnceBtn">🔍 Detect (single)</button>
        <button id="toggleTrackingBtn">⏯️ Tracking</button>
        <button id="lockSystemBtn" class="warning">🔐 Lock System</button>
    </div>

    <!-- REGISTRATION (SECURE: ONLY AVAILABLE IN CERTAIN STATES) -->
    <div class="register-section">
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 6px;">
            <span style="color: #e2e8f0; font-weight: 500;">📝 Register Face (only when IDLE/UNLOCKED)</span>
            <span id="registerAllowedBadge" style="font-size:0.8rem; background:#1e293b; padding:2px 12px; border-radius:20px;">⚠️ restricted</span>
        </div>
        <div class="label-row">
            <input type="text" id="registerNameInput" placeholder="e.g., Alice (case sensitive)" value="Admin" />
            <button id="registerFaceBtn">➕ Register Current Face</button>
            <button id="clearAllFacesBtn">🗑️ Clear All</button>
        </div>
        <div class="face-list" id="registeredFacesList">
            <!-- dynamic chips -->
        </div>
    </div>

    <!-- LOG / EVENT STREAM -->
    <div class="log-area" id="logPanel">
        [SYSTEM] Ready. Initialize camera.
    </div>
    <div class="footnote">
        ⚡ State machine enforces security: LOCKED → UNLOCKED only via face match. Registration allowed only in IDLE/UNLOCKED.
    </div>
</div>

<!-- face-api.js + tensorflow -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
    (function(){
        "use strict";

        // ---------- 🔐 STATE MACHINE (security core) ----------
        const STATES = {
            LOCKED: 'LOCKED',           // system locked, no auth, camera may be on but no recognition grants
            IDLE: 'IDLE',               // camera active, no tracking, ready
            DETECTING: 'DETECTING',     // manual detection mode
            TRACKING: 'TRACKING',       // continuous face recognition (auto-unlock on match)
            UNLOCKED: 'UNLOCKED'        // high security clearance (face matched)
        };

        // Allowed transitions map
        const transitions = {
            [STATES.LOCKED]:   [STATES.IDLE, STATES.LOCKED],
            [STATES.IDLE]:     [STATES.LOCKED, STATES.DETECTING, STATES.TRACKING, STATES.UNLOCKED],
            [STATES.DETECTING]: [STATES.IDLE, STATES.LOCKED, STATES.UNLOCKED],
            [STATES.TRACKING]:  [STATES.IDLE, STATES.LOCKED, STATES.UNLOCKED],
            [STATES.UNLOCKED]:  [STATES.LOCKED, STATES.IDLE, STATES.DETECTING, STATES.TRACKING]
        };

        let currentState = STATES.LOCKED;
        let authLevel = 0;          // 0 = none, 1 = unlocked (face match)
        let lastMatchedUser = null;
        let trackingActive = false;
        let trackingInterval = null;

        // DOM elements
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const stateDisplay = document.getElementById('stateDisplay');
        const authLevelDisplay = document.getElementById('authLevelDisplay');
        const transitionHint = document.getElementById('transitionHint');
        const logPanel = document.getElementById('logPanel');
        const registerAllowedBadge = document.getElementById('registerAllowedBadge');
        const registerNameInput = document.getElementById('registerNameInput');
        const registerFaceBtn = document.getElementById('registerFaceBtn');
        const clearAllBtn = document.getElementById('clearAllFacesBtn');
        const startCameraBtn = document.getElementById('startCameraBtn');
        const stopCameraBtn = document.getElementById('stopCameraBtn');
        const detectOnceBtn = document.getElementById('detectOnceBtn');
        const toggleTrackingBtn = document.getElementById('toggleTrackingBtn');
        const lockSystemBtn = document.getElementById('lockSystemBtn');
        const registeredFacesList = document.getElementById('registeredFacesList');

        // face-api storage
        let labeledDescriptors = [];        // array of LabeledFaceDescriptors
        let faceMatcher = null;
        let modelsLoaded = false;
        let stream = null;

        // ---------- logging ----------
        function log(msg, type='info') {
            const prefix = {
                info: '📋',
                success: '✅',
                warn: '⚠️',
                error: '❌',
                state: '🔁'
            }[type] || '•';
            const entry = `[${new Date().toLocaleTimeString()}] ${prefix} ${msg}`;
            logPanel.innerHTML = entry + '<br>' + logPanel.innerHTML;
            if (logPanel.children.length > 6) logPanel.removeChild(logPanel.lastChild);
        }

        // ---------- state transition with security guard ----------
        function transitionTo(newState, meta = {}) {
            const from = currentState;
            if (!transitions[from]?.includes(newState)) {
                log(`SECURITY BLOCK: Transition ${from} → ${newState} not allowed`, 'error');
                return false;
            }

            // extra security rules: UNLOCKED only via face match (except manual unlock from trusted context)
            if (newState === STATES.UNLOCKED && !meta.bypass && !meta.faceMatch) {
                log(`🚫 Cannot force UNLOCKED without face match`, 'error');
                return false;
            }

            // if leaving TRACKING, clear interval
            if (from === STATES.TRACKING) {
                stopTrackingLoop();
            }

            // state change effects
            currentState = newState;
            
            if (newState === STATES.UNLOCKED) {
                authLevel = 1;
                if (meta.user) lastMatchedUser = meta.user;
                log(`🔓 UNLOCKED · Welcome ${lastMatchedUser || 'user'}`, 'success');
            } else if (newState === STATES.LOCKED) {
                authLevel = 0;
                lastMatchedUser = null;
                log(`🔒 System LOCKED · auth cleared`, 'warn');
            } else {
                // IDLE / DETECTING / TRACKING do not change authLevel except when unlocked
                if (newState !== STATES.UNLOCKED) authLevel = 0;
            }

            // tracking auto-start if TRACKING state
            if (newState === STATES.TRACKING) {
                startTrackingLoop();
                log(`🎯 TRACKING mode active · continuous recognition`, 'state');
            }

            updateUIForState();
            updateRegisterRestriction();
            log(`State: ${from} → ${newState} ${meta.faceMatch ? '(via face match)' : ''}`, 'state');
            return true;
        }

        function stopTrackingLoop() {
            if (trackingInterval) {
                clearInterval(trackingInterval);
                trackingInterval = null;
            }
        }

        function startTrackingLoop() {
            if (trackingInterval) clearInterval(trackingInterval);
            trackingInterval = setInterval(async () => {
                if (currentState !== STATES.TRACKING) {
                    stopTrackingLoop();
                    return;
                }
                if (!stream || video.paused || !modelsLoaded) return;
                await performDetectionAndMatch(true); // auto mode
            }, 600); // ~1.6 fps (balance)
        }

        // ---------- update UI based on state ----------
        function updateUIForState() {
            stateDisplay.textContent = currentState;
            authLevelDisplay.textContent = `🔒 Level: ${authLevel} ${authLevel===1?'(UNLOCKED)':''}`;
            
            // transition hints
            if (currentState === STATES.LOCKED) transitionHint.textContent = '⛔ Face match required to unlock';
            else if (currentState === STATES.UNLOCKED) transitionHint.textContent = '🔓 High security · can lock anytime';
            else if (currentState === STATES.TRACKING) transitionHint.textContent = '👁️ Auto-unlock on recognized face';
            else transitionHint.textContent = '🟢 Ready for detection';

            // Buttons
            toggleTrackingBtn.textContent = (currentState === STATES.TRACKING) ? '⏸️ Stop Tracking' : '▶️ Start Tracking';
            const trackingPossible = (currentState === STATES.IDLE || currentState === STATES.DETECTING || currentState === STATES.UNLOCKED);
            const canStartTrack = (currentState !== STATES.TRACKING && trackingPossible) || currentState === STATES.TRACKING;
            toggleTrackingBtn.disabled = (!stream || currentState === STATES.LOCKED) ? true : !canStartTrack;
            
            detectOnceBtn.disabled = (currentState === STATES.LOCKED || !stream || currentState === STATES.TRACKING);
            lockSystemBtn.disabled = (currentState === STATES.LOCKED);
            startCameraBtn.disabled = !!stream;
            stopCameraBtn.disabled = !stream;
        }

        function updateRegisterRestriction() {
            // registration allowed only in IDLE or UNLOCKED (security policy)
            const allowed = (currentState === STATES.IDLE || currentState === STATES.UNLOCKED);
            registerFaceBtn.disabled = !allowed || !stream || labeledDescriptors.length >= 20; // limit for demo
            registerAllowedBadge.textContent = allowed ? '✅ ALLOWED' : '⛔ RESTRICTED';
            registerAllowedBadge.style.background = allowed ? '#065f46' : '#7f1d1d';
        }

        // ---------- FACE MATCHING & DETECTION ----------
        async function performDetectionAndMatch(autoUnlock = false) {
            if (!stream || video.paused || video.readyState !== 4) return null;
            if (!modelsLoaded) { log('Models not ready', 'warn'); return null; }

            try {
                const detections = await faceapi.detectAllFaces(video, 
                    new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 }))
                    .withFaceLandmarks()
                    .withFaceDescriptors();
                
                // draw
                drawDetections(detections);

                if (!detections.length) {
                    if (autoUnlock && currentState === STATES.TRACKING) {
                        // no face, do nothing
                    }
                    return null;
                }

                // if we have registered faces, match
                if (labeledDescriptors.length > 0 && faceMatcher) {
                    const results = detections.map(d => faceMatcher.findBestMatch(d.descriptor));
                    const bestResult = results.reduce((best, curr) => 
                        (curr.distance < best.distance ? curr : best), results[0]);
                    
                    const threshold = 0.5;  // face-api default good
                    const isMatch = bestResult.distance < threshold;
                    const matchedLabel = isMatch ? bestResult.label : 'unknown';
                    
                    // draw labels
                    drawMatchLabels(detections, results);
                    
                    // SECURITY: AUTO UNLOCK if in TRACKING or if we call with autoUnlock
                    if (isMatch) {
                        if (currentState === STATES.TRACKING && authLevel === 0) {
                            // transition to UNLOCKED via face match
                            transitionTo(STATES.UNLOCKED, { faceMatch: true, user: matchedLabel });
                        } else if (currentState === STATES.DETECTING && autoUnlock) {
                            // manual detection can unlock (if we choose)
                            transitionTo(STATES.UNLOCKED, { faceMatch: true, user: matchedLabel });
                        }
                        log(`👤 Match: ${matchedLabel} (${bestResult.distance.toFixed(2)})`, 'success');
                    } else {
                        if (currentState === STATES.TRACKING) {
                            // do nothing, remains locked
                        }
                    }
                    return { detections, match: bestResult };
                } else {
                    // no registered faces
                    drawNoMatchLabels(detections);
                }
                return detections;
            } catch (e) {
                console.warn('detection error', e);
                return null;
            }
        }

        function drawDetections(detections) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!detections.length) return;
            
            faceapi.draw.drawDetections(canvas, detections.map(d => d.detection));
            faceapi.draw.drawFaceLandmarks(canvas, detections.map(d => d.landmarks));
        }

        function drawMatchLabels(detections, matchResults) {
            detections.forEach((det, i) => {
                const box = det.detection.box;
                const res = matchResults[i];
                const text = `${res.label} (${res.distance.toFixed(2)})`;
                new faceapi.draw.DrawTextField([text], box.bottomLeft).draw(canvas);
            });
        }
        function drawNoMatchLabels(detections) {
            detections.forEach(det => {
                const box = det.detection.box;
                new faceapi.draw.DrawTextField(['no ref'], box.bottomLeft).draw(canvas);
            });
        }

        // ---------- Rebuild face matcher ----------
        function rebuildMatcher() {
            if (labeledDescriptors.length === 0) {
                faceMatcher = null;
                return;
            }
            faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.5);
        }

        // update UI list
        function renderFaceList() {
            const names = labeledDescriptors.map(ld => ld.label);
            registeredFacesList.innerHTML = names.map(name => `
                <div class="chip">
                    <span>🧑 ${name}</span>
                    <button data-name="${name}" class="remove-face-btn" style="padding:2px 10px;">✖</button>
                </div>
            `).join('');
            document.querySelectorAll('.remove-face-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const name = btn.dataset.name;
                    labeledDescriptors = labeledDescriptors.filter(ld => ld.label !== name);
                    rebuildMatcher();
                    renderFaceList();
                    log(`Removed face: ${name}`, 'info');
                    if (labeledDescriptors.length === 0) updateRegisterRestriction();
                });
            });
            updateRegisterRestriction();
        }

        // register current face
        async function registerCurrentFace() {
            if (!stream) { log('Camera off', 'error'); return; }
            const name = registerNameInput.value.trim();
            if (!name) { log('Enter a name', 'warn'); return; }
            if (labeledDescriptors.some(ld => ld.label === name)) {
                log(`Name "${name}" already exists`, 'warn');
                return;
            }
            try {
                const detections = await faceapi.detectSingleFace(video, 
                    new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                if (!detections) { log('No face detected for registration', 'warn'); return; }
                
                const existing = labeledDescriptors.find(ld => ld.label === name);
                if (!existing) {
                    labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(name, [detections.descriptor]));
                } else {
                    // add descriptor (but we use replace for simplicity)
                    labeledDescriptors = labeledDescriptors.filter(ld => ld.label !== name);
                    labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(name, [detections.descriptor]));
                }
                rebuildMatcher();
                renderFaceList();
                log(`✅ Registered "${name}"`, 'success');
                // keep state, but re-check register button
            } catch (e) {
                log('Registration failed', 'error');
            }
        }

        // ---------- Camera ----------
        async function startCamera() {
            if (stream) return;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
                video.srcObject = stream;
                await new Promise(r => video.onloadedmetadata = r);
                video.play();
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                if (!modelsLoaded) {
                    log('⏳ Loading face-api models...', 'info');
                    await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
                    await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
                    await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
                    modelsLoaded = true;
                    log('✅ Models ready', 'success');
                }
                
                // transition to IDLE if locked
                if (currentState === STATES.LOCKED) {
                    transitionTo(STATES.IDLE);
                } else if (currentState !== STATES.IDLE && currentState !== STATES.UNLOCKED) {
                    // ensure consistent
                }
                updateUIForState();
                log('📸 Camera active', 'success');
            } catch (err) {
                log(`Camera error: ${err.message}`, 'error');
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
                video.srcObject = null;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (currentState === STATES.TRACKING) stopTrackingLoop();
                if (currentState !== STATES.LOCKED) transitionTo(STATES.LOCKED);
                updateUIForState();
                log('Camera stopped', 'info');
            }
        }

        // ---------- event wiring ----------
        startCameraBtn.addEventListener('click', startCamera);
        stopCameraBtn.addEventListener('click', stopCamera);
        
        detectOnceBtn.addEventListener('click', async () => {
            if (!stream) return;
            if (currentState === STATES.LOCKED) { log('System locked', 'warn'); return; }
            // go to DETECTING state
            transitionTo(STATES.DETECTING);
            await performDetectionAndMatch(true); // allow unlock on match
            // after detection, if not unlocked go back to IDLE
            if (currentState === STATES.DETECTING) transitionTo(STATES.IDLE);
        });

        toggleTrackingBtn.addEventListener('click', () => {
            if (currentState === STATES.TRACKING) {
                transitionTo(STATES.IDLE);
            } else {
                if (currentState === STATES.LOCKED) { log('Cannot track while locked', 'warn'); return; }
                transitionTo(STATES.TRACKING);
            }
        });

        lockSystemBtn.addEventListener('click', () => {
            transitionTo(STATES.LOCKED);
        });

        registerFaceBtn.addEventListener('click', () => {
            if (!(currentState === STATES.IDLE || currentState === STATES.UNLOCKED)) {
                log('Registration not allowed in this state', 'error');
                return;
            }
            registerCurrentFace();
        });

        clearAllBtn.addEventListener('click', () => {
            labeledDescriptors = [];
            rebuildMatcher();
            renderFaceList();
            log('All faces cleared', 'info');
        });

        // initialize
        function init() {
            transitionTo(STATES.LOCKED, { bypass: true });
            renderFaceList();
            updateRegisterRestriction();
            log('🛡️ Security state machine ready', 'state');
        }

        init();

        // window resize adaptation for canvas (keep ratio)
        function resizeCanvasDisplay() {
            if (!video.videoWidth) return;
            canvas.style.width = '100%';
            canvas.style.height = 'auto';
        }
        window.addEventListener('resize', resizeCanvasDisplay);
        video.addEventListener('play', () => resizeCanvasDisplay());

        // extra: allow quick demo: preload an "Admin" descriptor optionally? not needed.

        // Expose for console debugging (optional)
        window.debugState = ()=> console.log(currentState, labeledDescriptors);
    })();
</script>
</body>
</html>
